<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelegramWhite Messenger</title>
    <style>
        :root {
            --primary: #0088cc; --primary-light: #33aadd;
            --bg-darkest: #050505; --bg-dark: #0d0d0d;
            --bg-mid: #1a1a1a; --bg-light: #252525;
            --text: #f0f0f0; --text-dim: #888;
            --online: #44cc66; --error: #ff4444; --success: #44cc77;
            --typing-color: #ffaa00;
            --border: rgba(255,255,255,0.08); --shadow: rgba(0,0,0,0.5);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg-darkest); color:var(--text); height:100vh; overflow:hidden; font-size:15px; }

        /* LOGIN */
        #loginModal { position:fixed; inset:0; background:rgba(0,0,0,0.97); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .login-box { background:var(--bg-dark); border:1px solid rgba(0,136,204,0.35); border-radius:18px; padding:36px; width:100%; max-width:440px; box-shadow:0 20px 60px var(--shadow); }
        .login-logo { text-align:center; margin-bottom:28px; }
        .login-logo .icon { font-size:3rem; display:block; margin-bottom:6px; }
        .login-logo h1 { font-size:1.4rem; color:var(--primary-light); font-weight:700; }
        .login-logo small { color:var(--text-dim); font-size:0.8rem; }
        .tabs { display:flex; background:var(--bg-mid); border-radius:10px; padding:4px; margin-bottom:24px; }
        .tab-btn { flex:1; padding:9px; background:transparent; border:none; border-radius:8px; color:var(--text-dim); cursor:pointer; font-size:0.9rem; transition:all .2s; }
        .tab-btn.active { background:var(--primary); color:#fff; font-weight:600; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; margin-bottom:6px; color:var(--text-dim); font-size:0.82rem; text-transform:uppercase; letter-spacing:.5px; }
        .inp { width:100%; padding:11px 14px; background:var(--bg-mid); border:1px solid var(--border); border-radius:9px; color:var(--text); font-size:0.95rem; transition:border-color .2s; }
        .inp:focus { outline:none; border-color:var(--primary); }
        .server-row { display:flex; gap:8px; }
        .btn-icon { background:var(--bg-mid); border:1px solid var(--border); border-radius:9px; padding:0 13px; color:var(--text-dim); cursor:pointer; font-size:1rem; transition:all .2s; }
        .btn-icon:hover { background:var(--bg-light); color:var(--text); }
        .server-status { display:flex; align-items:center; gap:7px; margin-top:7px; font-size:0.82rem; color:var(--text-dim); min-height:20px; }
        .dot { width:7px; height:7px; border-radius:50%; background:var(--text-dim); flex-shrink:0; }
        .dot.online { background:var(--online); animation:blink 2s infinite; }
        .dot.connecting { background:var(--typing-color); animation:blink .8s infinite; }
        .dot.error { background:var(--error); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
        .hint { font-size:0.78rem; margin-top:4px; min-height:16px; }
        .hint.err { color:var(--error); } .hint.ok { color:var(--success); }
        .msg-box { padding:11px 14px; border-radius:9px; font-size:0.88rem; margin-bottom:16px; display:none; }
        .msg-box.error { background:rgba(255,68,68,.12); border:1px solid rgba(255,68,68,.3); color:var(--error); display:block; }
        .msg-box.success { background:rgba(68,204,119,.12); border:1px solid rgba(68,204,119,.3); color:var(--success); display:block; }
        .msg-box.info { background:rgba(0,136,204,.12); border:1px solid rgba(0,136,204,.3); color:var(--primary-light); display:block; }
        .btn-primary { width:100%; padding:12px; background:var(--primary); border:none; border-radius:9px; color:#fff; font-size:1rem; font-weight:600; cursor:pointer; transition:background .2s; }
        .btn-primary:hover { background:var(--primary-light); }
        .btn-primary:disabled { background:#444; cursor:not-allowed; }
        .btn-secondary { padding:12px 18px; background:var(--bg-mid); border:1px solid var(--border); border-radius:9px; color:var(--text-dim); cursor:pointer; transition:all .2s; font-size:0.9rem; }
        .btn-secondary:hover { background:var(--bg-light); color:var(--text); }
        .btn-row { display:flex; gap:8px; margin-top:20px; }
        .btn-row .btn-primary { flex:1; }

        /* DM MODAL */
        #dmModal { position:fixed; inset:0; background:rgba(0,0,0,0.75); display:none; align-items:center; justify-content:center; z-index:5000; backdrop-filter:blur(4px); }
        #dmModal.open { display:flex; }
        .dm-box { background:var(--bg-dark); border:1px solid rgba(0,136,204,0.4); border-radius:16px; padding:28px; width:100%; max-width:400px; box-shadow:0 20px 60px var(--shadow); animation:popIn .2s ease; }
        @keyframes popIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
        .dm-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
        .dm-header h2 { font-size:1.1rem; display:flex; align-items:center; gap:8px; }
        .dm-close { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:1.3rem; line-height:1; padding:4px; border-radius:6px; transition:all .2s; }
        .dm-close:hover { background:rgba(255,255,255,.1); color:var(--text); }
        .dm-search-row { display:flex; gap:8px; margin-bottom:16px; }
        .dm-search-row .inp { flex:1; }
        .dm-search-btn { padding:0 18px; background:var(--primary); border:none; border-radius:9px; color:#fff; cursor:pointer; font-size:0.9rem; font-weight:600; white-space:nowrap; transition:background .2s; }
        .dm-search-btn:hover { background:var(--primary-light); }
        .dm-search-btn:disabled { background:#444; cursor:not-allowed; }
        .dm-section-title { font-size:0.7rem; text-transform:uppercase; letter-spacing:.6px; color:var(--text-dim); margin-bottom:8px; font-weight:600; }
        .dm-results { max-height:220px; overflow-y:auto; }
        .dm-user-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:10px; cursor:pointer; transition:background .15s; border:1px solid transparent; margin-bottom:4px; }
        .dm-user-item:hover { background:rgba(0,136,204,.15); border-color:rgba(0,136,204,.3); }
        .dm-user-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-light)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem; flex-shrink:0; }
        .dm-user-name { font-weight:600; font-size:0.95rem; }
        .dm-user-sub { font-size:0.75rem; color:var(--text-dim); display:flex; align-items:center; gap:4px; }
        .dm-empty { color:var(--text-dim); font-size:0.85rem; text-align:center; padding:20px; line-height:1.6; }
        .dm-err { color:var(--error); font-size:0.85rem; padding:8px 0; text-align:center; }

        /* APP */
        #app { display:none; height:100vh; flex-direction:column; }
        .top-bar { background:var(--primary); padding:0 18px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; box-shadow:0 2px 8px var(--shadow); z-index:100; }
        .top-bar-left { display:flex; align-items:center; gap:10px; }
        .top-bar-logo { font-weight:700; font-size:1.05rem; display:flex; align-items:center; gap:6px; }
        .conn-badge { font-size:0.72rem; padding:2px 8px; background:rgba(255,255,255,.2); border-radius:10px; }
        .conn-badge.live { background:rgba(68,204,119,.35); }
        .top-bar-right { display:flex; align-items:center; gap:8px; }
        .nav-btn { background:rgba(255,255,255,.18); border:none; border-radius:18px; color:#fff; padding:6px 14px; cursor:pointer; font-size:0.85rem; transition:background .2s; }
        .nav-btn:hover { background:rgba(255,255,255,.28); }
        .nav-btn.accent { background:rgba(255,255,255,.3); font-weight:600; }
        .app-body { display:flex; flex:1; overflow:hidden; }

        /* SIDEBAR */
        .sidebar { width:300px; background:var(--bg-dark); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
        .sidebar-me { padding:14px 16px; display:flex; align-items:center; gap:11px; border-bottom:1px solid var(--border); background:rgba(0,136,204,.08); }
        .avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-light)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.1rem; flex-shrink:0; text-transform:uppercase; }
        .avatar.sm { width:34px; height:34px; font-size:0.9rem; }
        .me-name { font-weight:600; font-size:0.95rem; }
        .me-status { font-size:0.75rem; color:var(--online); }
        .online-section { padding:10px 14px 8px; border-bottom:1px solid var(--border); }
        .section-title { font-size:0.7rem; text-transform:uppercase; letter-spacing:.7px; color:var(--text-dim); margin-bottom:8px; font-weight:600; }
        .online-pills { display:flex; flex-wrap:wrap; gap:5px; max-height:64px; overflow-y:auto; }
        .online-pill { background:rgba(0,136,204,.18); border:1px solid rgba(0,136,204,.3); border-radius:12px; padding:3px 9px; font-size:0.78rem; cursor:pointer; display:flex; align-items:center; gap:5px; transition:background .2s; }
        .online-pill:hover { background:rgba(0,136,204,.35); }
        .online-pill .dot { width:6px; height:6px; background:var(--online); }
        .chats-section { padding:10px 12px 4px; display:flex; align-items:center; justify-content:space-between; }
        .icon-btn { background:none; border:none; color:var(--primary-light); cursor:pointer; font-size:1.2rem; padding:3px 6px; border-radius:6px; transition:background .2s; }
        .icon-btn:hover { background:rgba(0,136,204,.2); }
        .chat-list { flex:1; overflow-y:auto; padding:0 6px 8px; }
        .chat-item { display:flex; align-items:center; padding:10px; border-radius:10px; cursor:pointer; gap:11px; transition:background .15s; margin-bottom:2px; }
        .chat-item:hover { background:rgba(255,255,255,.05); }
        .chat-item.active { background:rgba(0,136,204,.2); }
        .chat-icon { width:40px; height:40px; border-radius:50%; background:var(--bg-light); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
        .chat-icon.priv { background:linear-gradient(135deg,#1a3a5c,#0d5a8a); font-size:1rem; font-weight:700; color:#fff; }
        .chat-meta { flex:1; min-width:0; }
        .chat-name { font-weight:600; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .chat-preview { font-size:0.78rem; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .chat-time { font-size:0.72rem; color:var(--text-dim); flex-shrink:0; }
        .unread { background:var(--primary); color:#fff; font-size:0.7rem; font-weight:700; border-radius:10px; padding:1px 7px; min-width:20px; text-align:center; }

        /* CHAT AREA */
        .chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg-darkest); }
        .chat-top { padding:12px 18px; border-bottom:1px solid var(--border); background:var(--bg-dark); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .chat-top-left { display:flex; align-items:center; gap:12px; }
        .chat-top-name { font-weight:700; font-size:1rem; }
        .chat-top-sub { font-size:0.78rem; color:var(--text-dim); }
        .typing-txt { color:var(--typing-color); font-style:italic; }
        .messages { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:8px; }
        .msg { max-width:68%; animation:msgIn .2s ease; }
        @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .msg.out { align-self:flex-end; }
        .msg.in { align-self:flex-start; }
        .msg.sys { align-self:center; max-width:90%; background:rgba(255,255,255,.07); border-radius:10px; padding:6px 14px; font-size:0.82rem; color:var(--text-dim); text-align:center; }
        .msg-bubble { padding:10px 14px; border-radius:16px; line-height:1.45; word-break:break-word; }
        .msg.out .msg-bubble { background:var(--primary); border-bottom-right-radius:4px; }
        .msg.in .msg-bubble { background:var(--bg-light); border-bottom-left-radius:4px; }
        .msg-sender { font-size:0.76rem; font-weight:700; color:var(--primary-light); margin-bottom:3px; }
        .msg-text { font-size:0.93rem; }
        .msg-footer { display:flex; align-items:center; justify-content:flex-end; gap:5px; margin-top:4px; }
        .msg-time { font-size:0.7rem; opacity:.65; }
        .msg-tick { font-size:0.75rem; opacity:.7; }
        .load-more { text-align:center; padding:8px; }
        .load-more-btn { background:none; border:1px solid var(--border); border-radius:20px; color:var(--text-dim); padding:5px 16px; cursor:pointer; font-size:0.8rem; transition:all .2s; }
        .load-more-btn:hover { background:var(--bg-light); color:var(--text); }
        .input-bar { padding:12px 16px; background:var(--bg-dark); border-top:1px solid var(--border); flex-shrink:0; }
        .input-row { display:flex; align-items:flex-end; gap:8px; }
        .msg-input { flex:1; background:var(--bg-mid); border:1px solid var(--border); border-radius:22px; padding:10px 16px; color:var(--text); font-size:0.95rem; resize:none; font-family:inherit; min-height:42px; max-height:110px; outline:none; transition:border-color .2s; }
        .msg-input:focus { border-color:var(--primary); }
        .send-btn { width:42px; height:42px; background:var(--primary); border:none; border-radius:50%; color:#fff; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
        .send-btn:hover { background:var(--primary-light); transform:scale(1.05); }
        .send-btn:disabled { background:#444; cursor:not-allowed; transform:none; }
        .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-dim); gap:12px; }
        .empty-state .big-icon { font-size:3.5rem; }
        .empty-state h2 { font-size:1.1rem; color:var(--text); }
        .empty-state p { font-size:0.85rem; text-align:center; max-width:260px; line-height:1.5; }
        .empty-dm-btn { margin-top:8px; padding:10px 22px; background:var(--primary); border:none; border-radius:20px; color:#fff; cursor:pointer; font-size:0.9rem; font-weight:600; transition:background .2s; }
        .empty-dm-btn:hover { background:var(--primary-light); }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:3px; }
        #demoBanner { position:fixed; bottom:14px; right:14px; background:rgba(255,170,0,.15); border:1px solid rgba(255,170,0,.4); color:var(--typing-color); padding:9px 14px; border-radius:10px; font-size:0.82rem; z-index:200; display:none; }
        .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
        @keyframes spin { to{transform:rotate(360deg)} }
        @media (max-width:700px) {
            .sidebar { width:72px; }
            .sidebar-me .me-name,.sidebar-me .me-status,.online-section { display:none; }
            .chat-item { padding:8px; justify-content:center; }
            .chat-meta,.chat-time,.unread { display:none; }
        }
    </style>
</head>
<body>

<!-- LOGIN MODAL -->
<div id="loginModal">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">💬</span>
      <h1>TelegramWhite</h1>
      <small>Безопасный веб-мессенджер</small>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Вход</button>
      <button class="tab-btn" data-tab="reg">Регистрация</button>
    </div>
    <div id="msgBox" class="msg-box"></div>
    <div id="tab-login" class="tab-content active">
      <div class="form-group">
        <label>Имя пользователя</label>
        <input id="lUser" class="inp" type="text" placeholder="Введите логин" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input id="lPass" class="inp" type="password" placeholder="Введите пароль" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>Сервер</label>
        <div class="server-row">
          <select id="serverSel" class="inp">
            <option value="">Выберите сервер...</option>
            <option value="wss://telegramwhite-server.onrender.com">☁️ Render (облако)</option>
            <option value="ws://localhost:8080">🏠 Локальный</option>
            <option value="custom">🔗 Другой адрес...</option>
            <option value="demo">🎮 Демо-режим</option>
          </select>
          <button class="btn-icon" id="refreshBtn">🔄</button>
        </div>
        <input id="customUrl" class="inp" type="text" placeholder="wss:// или ws://" style="display:none;margin-top:8px;">
        <div id="srvStatus" class="server-status"><span class="dot"></span><span>Не выбрано</span></div>
      </div>
      <div class="btn-row">
        <button id="loginBtn" class="btn-primary">Войти</button>
        <button id="autoBtn" class="btn-secondary">Авто</button>
      </div>
    </div>
    <div id="tab-reg" class="tab-content">
      <div class="form-group">
        <label>Имя пользователя</label>
        <input id="rUser" class="inp" type="text" placeholder="3–20 символов" autocomplete="username">
        <div id="rUserHint" class="hint"></div>
      </div>
      <div class="form-group">
        <label>Email (необязательно)</label>
        <input id="rEmail" class="inp" type="email" placeholder="email@пример.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input id="rPass" class="inp" type="password" placeholder="Минимум 6 символов" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Подтвердите пароль</label>
        <input id="rPass2" class="inp" type="password" placeholder="Повторите пароль" autocomplete="new-password">
        <div id="rPassHint" class="hint"></div>
      </div>
      <div class="btn-row">
        <button id="regBtn" class="btn-primary">Зарегистрироваться</button>
      </div>
    </div>
  </div>
</div>

<!-- DM MODAL -->
<div id="dmModal">
  <div class="dm-box">
    <div class="dm-header">
      <h2>✉️ Написать пользователю</h2>
      <button class="dm-close" id="dmClose">✕</button>
    </div>
    <div class="dm-search-row">
      <input id="dmInput" class="inp" type="text" placeholder="Введите точный ник...">
      <button class="dm-search-btn" id="dmSearchBtn">Найти</button>
    </div>
    <div id="dmErr" class="dm-err" style="display:none"></div>
    <div id="dmResults" class="dm-results">
      <div id="dmOnlineWrap">
        <div class="dm-section-title" id="dmOnlineTitle">Сейчас онлайн</div>
        <div id="dmOnlineList"></div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-bar-logo">💬 TelegramWhite</div>
      <span id="connBadge" class="conn-badge">Demo</span>
    </div>
    <div class="top-bar-right">
      <button id="newDmBtn" class="nav-btn accent">✉️ Написать</button>
      <button id="logoutBtn" class="nav-btn">Выйти</button>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar">
      <div class="sidebar-me">
        <div id="meAvatar" class="avatar">?</div>
        <div>
          <div id="meName" class="me-name">Гость</div>
          <div class="me-status">● онлайн</div>
        </div>
      </div>
      <div class="online-section">
        <div class="section-title">Онлайн</div>
        <div id="onlinePills" class="online-pills">
          <span style="font-size:.8rem;color:var(--text-dim)">Никого...</span>
        </div>
      </div>
      <div class="chats-section">
        <span class="section-title">Чаты</span>
        <button class="icon-btn" id="sidebarDmBtn" title="Новый личный чат">✏️</button>
      </div>
      <div id="chatList" class="chat-list"></div>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="empty-state">
        <div class="big-icon">💬</div>
        <h2>Добро пожаловать!</h2>
        <p>Выберите чат или начните новый диалог с другим пользователем.</p>
        <button class="empty-dm-btn" id="emptyDmBtn">✉️ Написать кому-нибудь</button>
      </div>
    </div>
  </div>
</div>

<div id="demoBanner">⚠️ Демо-режим: сообщения в памяти браузера</div>

<script>
const S = {
    ws:null, user:null, token:null, demo:false,
    activeChat:null, chats:{}, chatMessages:{}, unread:{},
    typingTimers:{}, demoIdCounter:1, pingInterval:null,
    onlineUsers:[], pendingDm:false,
};
const DEMO_CHAT = {id:1, name:'Общий чат', type:'group'};
const DEMO_MSGS = [
    {id:1, username:'Система', text:'👋 Добро пожаловать в демо-режим!', created_at:Date.now()/1000-120, sys:true},
    {id:2, username:'Алиса', text:'Привет! Это пример сообщения 😊', created_at:Date.now()/1000-60},
];
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtTime = ts => new Date(ts*1000).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
const initials = n => (n||'?')[0].toUpperCase();
const autoResize = el => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; };

function showMsg(t,type='info'){const e=$('msgBox');e.textContent=t;e.className=`msg-box ${type}`;}
function clearMsg(){$('msgBox').className='msg-box';}
function setServerStatus(state,text){
    const el=$('srvStatus'),dot=el.querySelector('.dot'),span=el.querySelector('span');
    dot.className='dot '+(state==='ok'?'online':state==='wait'?'connecting':state==='err'?'error':'');
    span.textContent=text;
}

// TABS
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    $(`tab-${btn.dataset.tab}`).classList.add('active');

}));

// DM MODAL
function openDm(){
    if(S.demo){alert('В демо-режиме личные чаты недоступны');return;}
    $('dmModal').classList.add('open');
    $('dmInput').value='';
    $('dmErr').style.display='none';
    renderDmOnline();
    setTimeout(()=>$('dmInput').focus(),80);
}
function closeDm(){$('dmModal').classList.remove('open');S.pendingDm=false;}

function renderDmOnline(){
    const list=$('dmOnlineList'), title=$('dmOnlineTitle');
    const others=S.onlineUsers.filter(u=>u.id!==S.user?.id);
    if(!others.length){
        title.style.display='none';
        list.innerHTML='<div class="dm-empty">Никого нет онлайн.<br>Введите ник и нажмите Найти.</div>';
        return;
    }
    title.style.display='block';
    list.innerHTML='';
    others.forEach(u=>{
        const el=document.createElement('div');
        el.className='dm-user-item';
        el.innerHTML=`<div class="dm-user-avatar">${initials(u.username)}</div><div><div class="dm-user-name">${esc(u.username)}</div><div class="dm-user-sub"><span class="dot online" style="width:6px;height:6px"></span> онлайн</div></div>`;
        el.addEventListener('click',()=>{closeDm();startPrivateChat(u.username);});
        list.appendChild(el);
    });
}

$('dmClose').addEventListener('click',closeDm);
$('dmModal').addEventListener('click',e=>{if(e.target===$('dmModal'))closeDm();});
$('newDmBtn').addEventListener('click',openDm);
$('sidebarDmBtn').addEventListener('click',openDm);
$('emptyDmBtn') && $('emptyDmBtn').addEventListener('click',openDm);

$('dmSearchBtn').addEventListener('click',dmSearch);
$('dmInput').addEventListener('keydown',e=>{if(e.key==='Enter')dmSearch();});

function dmSearch(){
    const username=$('dmInput').value.trim();
    if(!username)return;
    if(username===S.user?.username){$('dmErr').textContent='Нельзя написать самому себе';$('dmErr').style.display='block';return;}
    $('dmErr').style.display='none';

    // Сначала ищем среди онлайн
    const found=S.onlineUsers.find(u=>u.username.toLowerCase()===username.toLowerCase());
    if(found){closeDm();startPrivateChat(found.username);return;}

    // Отправляем запрос серверу
    $('dmSearchBtn').disabled=true;$('dmSearchBtn').textContent='...';
    S.pendingDm=true;
    wsSend({type:'start_private',username});
    setTimeout(()=>{if(S.pendingDm){$('dmSearchBtn').disabled=false;$('dmSearchBtn').textContent='Найти';}},4000);
}

// SERVER
function getServerUrl(){
    const sel=$('serverSel').value;
    if(sel==='custom')return $('customUrl').value.trim();
    if(sel==='demo'||sel==='')return null;
    return sel;
}
$('serverSel').addEventListener('change',function(){
    const v=this.value;
    $('customUrl').style.display=v==='custom'?'block':'none';
    if(v&&v!=='custom'&&v!=='demo'&&v!=='')checkServer(v);
    else if(v==='demo')setServerStatus('ok','Демо-режим');
    else setServerStatus('','Не выбрано');
});
$('customUrl').addEventListener('input',function(){if(this.value.trim())checkServer(this.value.trim());});
$('refreshBtn').addEventListener('click',()=>{const url=getServerUrl();url?checkServer(url):autoDiscover();});
$('autoBtn').addEventListener('click',autoDiscover);

function checkServer(url){
    setServerStatus('wait','Проверяем...');
    try{
        const ws=new WebSocket(url);
        const t=setTimeout(()=>{ws.close();setServerStatus('err','Недоступен');},4000);
        ws.onopen=()=>{clearTimeout(t);ws.close();setServerStatus('ok','Сервер доступен ✓');};
        ws.onerror=()=>{clearTimeout(t);setServerStatus('err','Ошибка подключения');};
    }catch{setServerStatus('err','Неверный адрес');}
}

async function autoDiscover(){
    setServerStatus('wait','Поиск...');
    const urls=['wss://telegramwhite-server.onrender.com','ws://localhost:8080','ws://127.0.0.1:8080'];
    for(const url of urls){
        try{
            await new Promise((res,rej)=>{
                const ws=new WebSocket(url);
                const t=setTimeout(()=>{ws.close();rej();},3000);
                ws.onopen=()=>{clearTimeout(t);ws.close();res();};
                ws.onerror=()=>{clearTimeout(t);rej();};
            });
            const known={'wss://telegramwhite-server.onrender.com':1,'ws://localhost:8080':1};
            $('serverSel').value=known[url]?url:'custom';
            if($('serverSel').value==='custom'){$('customUrl').value=url;$('customUrl').style.display='block';}
            setServerStatus('ok',`Найден: ${url}`);
            return;
        }catch{}
    }
    setServerStatus('err','Серверы не найдены');
}

// AUTH
$('loginBtn').addEventListener('click',doLogin);
$('lPass').addEventListener('keydown',e=>e.key==='Enter'&&doLogin());
function doLogin(){
    const username=$('lUser').value.trim(), password=$('lPass').value, url=getServerUrl();
    if(!username||!password)return showMsg('Введите логин и пароль','error');
    if($('serverSel').value==='demo'||!url){enterDemoMode(username);return;}
    $('loginBtn').disabled=true;$('loginBtn').innerHTML='<span class="spinner"></span> Подключение...';
    connectWS(url,()=>wsSend({type:'login',username,password}),()=>{
        $('loginBtn').disabled=false;$('loginBtn').textContent='Войти';
        showMsg('Не удалось подключиться','error');
    });
}

$('regBtn').addEventListener('click',doRegister);
function doRegister(){
    const username=$('rUser').value.trim(),email=$('rEmail').value.trim(),pass=$('rPass').value,pass2=$('rPass2').value,url=getServerUrl();
    if(!username||username.length<3)return showMsg('Имя: минимум 3 символа','error');
    if(pass.length<6)return showMsg('Пароль: минимум 6 символов','error');
    if(pass!==pass2)return showMsg('Пароли не совпадают','error');
    if(!url||$('serverSel').value==='demo')return showMsg('Для регистрации выберите сервер','error');
    $('regBtn').disabled=true;$('regBtn').innerHTML='<span class="spinner"></span>';
    connectWS(url,()=>wsSend({type:'register',username,password:pass,email}),()=>{
        $('regBtn').disabled=false;$('regBtn').textContent='Зарегистрироваться';
        showMsg('Не удалось подключиться','error');
    });
}

$('rPass2').addEventListener('input',()=>{
    const h=$('rPassHint');
    if($('rPass').value&&$('rPass2').value){
        if($('rPass').value===$('rPass2').value){h.textContent='✓ Пароли совпадают';h.className='hint ok';}
        else{h.textContent='✗ Не совпадают';h.className='hint err';}
    }else h.textContent='';
});

// WS
function connectWS(url,onReady,onFail){
    try{
        const ws=new WebSocket(url);
        const t=setTimeout(()=>{ws.close();onFail&&onFail();},6000);
        ws.onopen=()=>{clearTimeout(t);S.ws=ws;ws.onmessage=e=>onMessage(JSON.parse(e.data));ws.onclose=onWsClose;ws.onerror=()=>{};onReady&&onReady();};
        ws.onerror=()=>{clearTimeout(t);onFail&&onFail();};
    }catch{onFail&&onFail();}
}
function wsSend(data){if(S.ws&&S.ws.readyState===WebSocket.OPEN){S.ws.send(JSON.stringify(data));return true;}return false;}
function onWsClose(){
    updateConnBadge(false);clearInterval(S.pingInterval);
    if(S.user)setTimeout(()=>{const url=getServerUrl();if(url)connectWS(url,()=>{if(S.token)wsSend({type:'session',token:S.token});},null);},3000);
}
function startPing(){clearInterval(S.pingInterval);S.pingInterval=setInterval(()=>wsSend({type:'ping'}),25000);}

// MESSAGES
function onMessage(data){
    switch(data.type){
        case 'registered':
            showMsg('✅ Регистрация успешна!','success');
            $('regBtn').disabled=false;$('regBtn').textContent='Зарегистрироваться';
            document.querySelector('[data-tab="login"]').click();$('lUser').value=$('rUser').value;
            break;
        case 'logged_in': case 'session_ok':
            $('loginBtn').disabled=false;$('loginBtn').textContent='Войти';
            S.user=data.user;S.token=data.token||S.token;
            if(data.token)localStorage.setItem('tw_session',JSON.stringify({token:data.token,url:getServerUrl()}));
            initChats(data.chats||[]);enterApp();startPing();
            break;
        case 'history':
            S.chatMessages[data.chat_id]=data.messages||[];
            if(S.activeChat===data.chat_id)renderMessages();
            break;
        case 'message':
            const msg=data.message;
            if(!S.chatMessages[msg.chat_id])S.chatMessages[msg.chat_id]=[];
            S.chatMessages[msg.chat_id].push(msg);
            if(S.activeChat===msg.chat_id){appendMessage(msg);scrollBottom();}
            else{S.unread[msg.chat_id]=(S.unread[msg.chat_id]||0)+1;updateUnread(msg.chat_id);}
            updateChatPreview(msg.chat_id,msg.username+': '+msg.text,msg.created_at);
            break;
        case 'system':
            const sm={id:'s'+Date.now(),text:data.text,created_at:Date.now()/1000,sys:true};
            if(!S.chatMessages[data.chat_id])S.chatMessages[data.chat_id]=[];
            S.chatMessages[data.chat_id].push(sm);
            if(S.activeChat===data.chat_id){appendMessage(sm);scrollBottom();}
            break;
        case 'online_users':
            S.onlineUsers=data.users||[];renderOnlineUsers(S.onlineUsers);renderDmOnline();
            break;
        case 'typing':
            if(data.chat_id===S.activeChat)showTyping(data.username);
            break;
        case 'private_chat_created': case 'new_private_chat':
            const c=data.chat;
            S.chats[c.id]=c;
            if(!S.chatMessages[c.id])S.chatMessages[c.id]=data.messages||[];
            addChatToList(c);
            if(data.type==='private_chat_created'){
                S.pendingDm=false;
                $('dmSearchBtn').disabled=false;$('dmSearchBtn').textContent='Найти';
                closeDm();switchChat(c.id);
            }
            break;
        case 'logged_out': doFullLogout(); break;
        case 'error':
            if(S.pendingDm){
                $('dmErr').textContent=data.message||'Пользователь не найден';
                $('dmErr').style.display='block';
                $('dmSearchBtn').disabled=false;$('dmSearchBtn').textContent='Найти';
                S.pendingDm=false;
            }else{
                showMsg(data.message||'Ошибка','error');
                $('loginBtn').disabled=false;$('loginBtn').textContent='Войти';
                $('regBtn').disabled=false;$('regBtn').textContent='Зарегистрироваться';
            }
            break;
        case 'pong': updateConnBadge(true); break;
    }
}

// DEMO
function enterDemoMode(username){
    S.demo=true;S.user={id:0,username};S.chats={1:DEMO_CHAT};S.chatMessages={1:[...DEMO_MSGS]};
    $('demoBanner').style.display='block';enterApp();
    setTimeout(()=>{
        const m={id:++S.demoIdCounter,text:`👋 ${username} присоединился!`,created_at:Date.now()/1000,sys:true};
        S.chatMessages[1].push(m);if(S.activeChat===1){appendMessage(m);scrollBottom();}
    },600);
}

// APP INIT
function enterApp(){
    $('loginModal').style.display='none';$('app').style.display='flex';
    $('meAvatar').textContent=initials(S.user.username);$('meName').textContent=S.user.username;
    updateConnBadge(!S.demo);renderChatList();switchChat(1);
    // Вешаем обработчик на кнопку в пустом экране (если она там есть)
    const eb=$('emptyDmBtn');if(eb)eb.addEventListener('click',openDm);
}

function updateConnBadge(ok){
    const el=$('connBadge');if(S.demo){el.textContent='Demo';el.className='conn-badge';return;}
    el.textContent=ok?'● Live':'⟳ Reconnect...';el.className=ok?'conn-badge live':'conn-badge';
}
function initChats(chats){S.chats={};chats.forEach(c=>S.chats[c.id]=c);if(!S.chats[1])S.chats[1]={id:1,name:'Общий чат',type:'group'};}

// RENDER
function renderChatList(){$('chatList').innerHTML='';Object.values(S.chats).forEach(c=>addChatToList(c));}

function addChatToList(chat){
    const cont=$('chatList');
    if(cont.querySelector(`[data-chat-id="${chat.id}"]`))return;
    const el=document.createElement('div');
    el.className='chat-item';el.dataset.chatId=chat.id;
    const priv=chat.type==='private';
    el.innerHTML=`
        <div class="chat-icon ${priv?'priv':''}">${priv?initials(chat.name):'💬'}</div>
        <div class="chat-meta">
            <div class="chat-name">${esc(chat.name)}</div>
            <div class="chat-preview" id="preview_${chat.id}">—</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <span class="chat-time" id="time_${chat.id}"></span>
            <span class="unread" id="unread_${chat.id}" style="display:none"></span>
        </div>`;
    el.addEventListener('click',()=>switchChat(chat.id));
    cont.appendChild(el);
}

function updateChatPreview(chatId,text,ts){
    const p=$(`preview_${chatId}`),t=$(`time_${chatId}`);
    if(p)p.textContent=text.length>40?text.slice(0,40)+'…':text;
    if(t)t.textContent=fmtTime(ts);
    const cont=$('chatList'),el=cont.querySelector(`[data-chat-id="${chatId}"]`);
    if(el)cont.insertBefore(el,cont.firstChild);
}

function updateUnread(chatId){
    const el=$(`unread_${chatId}`);if(!el)return;
    const n=S.unread[chatId]||0;el.textContent=n>99?'99+':n;el.style.display=n>0?'block':'none';
}

function renderOnlineUsers(users){
    const cont=$('onlinePills');cont.innerHTML='';
    const others=users.filter(u=>u.id!==S.user?.id);
    if(!others.length){cont.innerHTML='<span style="font-size:.8rem;color:var(--text-dim)">Никого...</span>';return;}
    others.forEach(u=>{
        const p=document.createElement('div');p.className='online-pill';
        p.innerHTML=`<span class="dot online"></span>${esc(u.username)}`;
        p.title=`Написать ${u.username}`;
        p.addEventListener('click',()=>startPrivateChat(u.username));
        cont.appendChild(p);
    });
}

// CHAT
function switchChat(chatId){
    S.activeChat=chatId;S.unread[chatId]=0;
    document.querySelectorAll('.chat-item').forEach(el=>el.classList.toggle('active',el.dataset.chatId==chatId));
    const u=$(`unread_${chatId}`);if(u)u.style.display='none';
    const chat=S.chats[chatId];if(!chat)return;
    renderChatArea(chat);
    if(!S.chatMessages[chatId]&&!S.demo)wsSend({type:'switch_chat',chat_id:chatId});
    else renderMessages();
}

function renderChatArea(chat){
    const priv=chat.type==='private';
    $('chatArea').innerHTML=`
        <div class="chat-top">
            <div class="chat-top-left">
                <div class="avatar sm">${priv?initials(chat.name):'💬'}</div>
                <div>
                    <div class="chat-top-name">${esc(chat.name)}</div>
                    <div class="chat-top-sub" id="chatSub">${priv?'👤 Личная переписка':'💬 Группа'}</div>
                </div>
            </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-bar">
            <div class="input-row">
                <textarea class="msg-input" id="msgInput" placeholder="Введите сообщение..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>`;
    const inp=$('msgInput'),btn=$('sendBtn');
    inp.addEventListener('input',()=>{autoResize(inp);if(!S.demo)wsSend({type:'typing',chat_id:S.activeChat});});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
    btn.addEventListener('click',sendMessage);
    setTimeout(()=>inp.focus(),50);
}

function renderMessages(){
    const cont=$('messages');if(!cont)return;cont.innerHTML='';
    const msgs=S.chatMessages[S.activeChat]||[];
    if(msgs.length>=50&&!S.demo){
        const lb=document.createElement('div');lb.className='load-more';
        lb.innerHTML=`<button class="load-more-btn" id="loadMoreBtn">⬆ Загрузить предыдущие</button>`;
        cont.appendChild(lb);$('loadMoreBtn').addEventListener('click',loadMore);
    }
    msgs.forEach(m=>appendMessage(m,false));scrollBottom();
}

function appendMessage(msg,animate=true){
    const cont=$('messages');if(!cont)return;
    const el=document.createElement('div');
    const isMe=msg.username===S.user?.username,isSys=msg.sys||msg.username==='Система';
    if(isSys){el.className='msg sys';el.textContent=msg.text;}
    else{
        el.className=`msg ${isMe?'out':'in'}`;if(!animate)el.style.animation='none';
        el.innerHTML=`<div class="msg-bubble">${!isMe?`<div class="msg-sender">${esc(msg.username)}</div>`:''}<div class="msg-text">${esc(msg.text)}</div><div class="msg-footer"><span class="msg-time">${fmtTime(msg.created_at)}</span>${isMe?'<span class="msg-tick">✓✓</span>':''}</div></div>`;
    }
    cont.appendChild(el);
}

function scrollBottom(){const c=$('messages');if(c)requestAnimationFrame(()=>c.scrollTop=c.scrollHeight);}
function loadMore(){const msgs=S.chatMessages[S.activeChat]||[];if(!msgs.length)return;wsSend({type:'get_history',chat_id:S.activeChat,before_id:msgs[0].id});}

// SEND
function sendMessage(){
    const inp=$('msgInput');if(!inp)return;
    const text=inp.value.trim();if(!text)return;
    inp.value='';autoResize(inp);
    if(S.demo){
        const msg={id:++S.demoIdCounter,username:S.user.username,text,created_at:Date.now()/1000,chat_id:S.activeChat};
        if(!S.chatMessages[S.activeChat])S.chatMessages[S.activeChat]=[];
        S.chatMessages[S.activeChat].push(msg);appendMessage(msg);scrollBottom();
        updateChatPreview(S.activeChat,text,msg.created_at);
        setTimeout(()=>{const r={id:++S.demoIdCounter,username:'Бот',text:`Эхо: ${text}`,created_at:Date.now()/1000,chat_id:S.activeChat};S.chatMessages[S.activeChat].push(r);appendMessage(r);scrollBottom();},700);
        return;
    }
    wsSend({type:'send_message',chat_id:S.activeChat,text});
}

// TYPING
function showTyping(username){
    const sub=$('chatSub');if(!sub)return;
    sub.innerHTML=`<span class="typing-txt">✏️ ${esc(username)} печатает...</span>`;
    clearTimeout(S.typingTimers[username]);
    S.typingTimers[username]=setTimeout(()=>{if(sub)sub.textContent=S.chats[S.activeChat]?.type==='group'?'💬 Группа':'👤 Личная переписка';},3000);
}

// PRIVATE CHAT
function startPrivateChat(username){
    if(S.demo){alert('В демо-режиме личные чаты недоступны');return;}
    wsSend({type:'start_private',username});
}

// LOGOUT
$('logoutBtn').addEventListener('click',()=>{if(!S.demo&&S.token)wsSend({type:'logout',token:S.token});else doFullLogout();});
function doFullLogout(){
    clearInterval(S.pingInterval);if(S.ws)S.ws.close();
    Object.assign(S,{ws:null,user:null,token:null,demo:false,activeChat:null,chats:{},chatMessages:{},unread:{},onlineUsers:[],pendingDm:false});
    localStorage.removeItem('tw_session');
    $('app').style.display='none';$('demoBanner').style.display='none';$('loginModal').style.display='flex';$('lPass').value='';clearMsg();
}

// AUTO SESSION
window.addEventListener('load',()=>{
    const saved=localStorage.getItem('tw_session');if(!saved)return;
    try{
        const{token,url}=JSON.parse(saved);if(!token||!url)return;
        const known={'wss://telegramwhite-server.onrender.com':1,'ws://localhost:8080':1};
        $('serverSel').value=known[url]?url:'custom';
        if($('serverSel').value==='custom'){$('customUrl').value=url;$('customUrl').style.display='block';}
        connectWS(url,()=>{wsSend({type:'session',token});S.token=token;},null);
    }catch{}
});
</script>
