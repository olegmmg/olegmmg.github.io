<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelegramWhite Messenger</title>
    <style>
        :root {
            --primary: #0088cc;
            --primary-dark: #006699;
            --primary-light: #33aadd;
            --bg-darkest: #050505;
            --bg-dark: #0d0d0d;
            --bg-mid: #1a1a1a;
            --bg-light: #252525;
            --text: #f0f0f0;
            --text-dim: #888;
            --online: #44cc66;
            --offline: #ff4444;
            --typing-color: #ffaa00;
            --error: #ff4444;
            --success: #44cc77;
            --border: rgba(255,255,255,0.08);
            --shadow: rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-darkest);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            font-size: 15px;
        }

        /* ═══════════════ МОДАЛЬНОЕ ОКНО ВХОДА ═══════════════ */
        #loginModal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.97);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }

        .login-box {
            background: var(--bg-dark);
            border: 1px solid rgba(0,136,204,0.35);
            border-radius: 18px;
            padding: 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px var(--shadow);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-logo .icon { font-size: 3rem; display: block; margin-bottom: 6px; }
        .login-logo h1 { font-size: 1.4rem; color: var(--primary-light); font-weight: 700; }
        .login-logo small { color: var(--text-dim); font-size: 0.8rem; }

        .tabs {
            display: flex;
            background: var(--bg-mid);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px;
        }
        .tab-btn {
            flex: 1; padding: 9px; background: transparent;
            border: none; border-radius: 8px;
            color: var(--text-dim); cursor: pointer;
            font-size: 0.9rem; transition: all .2s;
        }
        .tab-btn.active {
            background: var(--primary); color: #fff; font-weight: 600;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; margin-bottom: 6px;
            color: var(--text-dim); font-size: 0.82rem; text-transform: uppercase; letter-spacing: .5px;
        }
        .inp {
            width: 100%; padding: 11px 14px;
            background: var(--bg-mid);
            border: 1px solid var(--border);
            border-radius: 9px; color: var(--text);
            font-size: 0.95rem; transition: border-color .2s;
        }
        .inp:focus { outline: none; border-color: var(--primary); }

        .server-row { display: flex; gap: 8px; }
        .btn-icon {
            background: var(--bg-mid); border: 1px solid var(--border);
            border-radius: 9px; padding: 0 13px;
            color: var(--text-dim); cursor: pointer; font-size: 1rem;
            transition: all .2s; white-space: nowrap;
        }
        .btn-icon:hover { background: var(--bg-light); color: var(--text); }

        .server-status {
            display: flex; align-items: center; gap: 7px;
            margin-top: 7px; font-size: 0.82rem; color: var(--text-dim);
            min-height: 20px;
        }
        .dot {
            width: 7px; height: 7px;
            border-radius: 50%; background: var(--text-dim);
            flex-shrink: 0;
        }
        .dot.online { background: var(--online); animation: blink 2s infinite; }
        .dot.connecting { background: var(--typing-color); animation: blink .8s infinite; }
        .dot.error { background: var(--error); }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

        .hint { font-size: 0.78rem; margin-top: 4px; min-height: 16px; }
        .hint.err { color: var(--error); }
        .hint.ok { color: var(--success); }

        .msg-box {
            padding: 11px 14px; border-radius: 9px;
            font-size: 0.88rem; margin-bottom: 16px; display: none;
        }
        .msg-box.error { background: rgba(255,68,68,.12); border: 1px solid rgba(255,68,68,.3); color: var(--error); display: block; }
        .msg-box.success { background: rgba(68,204,119,.12); border: 1px solid rgba(68,204,119,.3); color: var(--success); display: block; }
        .msg-box.info { background: rgba(0,136,204,.12); border: 1px solid rgba(0,136,204,.3); color: var(--primary-light); display: block; }

        .btn-primary {
            width: 100%; padding: 12px;
            background: var(--primary); border: none; border-radius: 9px;
            color: #fff; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: background .2s;
        }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-primary:active { transform: scale(.98); }
        .btn-primary:disabled { background: #444; cursor: not-allowed; }

        .btn-secondary {
            padding: 12px 18px;
            background: var(--bg-mid); border: 1px solid var(--border);
            border-radius: 9px; color: var(--text-dim);
            cursor: pointer; transition: all .2s; font-size: 0.9rem;
        }
        .btn-secondary:hover { background: var(--bg-light); color: var(--text); }

        .btn-row { display: flex; gap: 8px; margin-top: 20px; }
        .btn-row .btn-primary { flex: 1; }

        /* ═══════════════ ОСНОВНОЙ ИНТЕРФЕЙС ═══════════════ */
        #app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        /* Шапка */
        .top-bar {
            background: var(--primary);
            padding: 0 18px;
            height: 52px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px var(--shadow);
            z-index: 100;
        }
        .top-bar-left { display: flex; align-items: center; gap: 10px; }
        .top-bar-logo { font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; gap: 6px; }
        .conn-badge {
            font-size: 0.72rem; padding: 2px 8px;
            background: rgba(255,255,255,.2); border-radius: 10px;
        }
        .conn-badge.live { background: rgba(68,204,119,.35); }

        .top-bar-right { display: flex; align-items: center; gap: 8px; }
        .nav-btn {
            background: rgba(255,255,255,.18); border: none;
            border-radius: 18px; color: #fff; padding: 6px 14px;
            cursor: pointer; font-size: 0.85rem; transition: background .2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,.28); }

        /* Контент */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Боковая панель */
        .sidebar {
            width: 300px;
            background: var(--bg-dark);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-me {
            padding: 14px 16px;
            display: flex; align-items: center; gap: 11px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,136,204,.08);
        }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.1rem; flex-shrink: 0;
            text-transform: uppercase;
        }
        .avatar.sm { width: 34px; height: 34px; font-size: 0.9rem; }
        .me-name { font-weight: 600; font-size: 0.95rem; }
        .me-status { font-size: 0.75rem; color: var(--online); }

        /* Онлайн-юзеры */
        .online-section {
            padding: 10px 14px 4px;
            border-bottom: 1px solid var(--border);
        }
        .section-title {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: .7px;
            color: var(--text-dim); margin-bottom: 8px; font-weight: 600;
        }
        .online-pills {
            display: flex; flex-wrap: wrap; gap: 5px;
            max-height: 64px; overflow-y: auto;
        }
        .online-pill {
            background: rgba(0,136,204,.18);
            border: 1px solid rgba(0,136,204,.3);
            border-radius: 12px; padding: 3px 9px;
            font-size: 0.78rem; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
            transition: background .2s;
        }
        .online-pill:hover { background: rgba(0,136,204,.3); }
        .online-pill .dot { width: 6px; height: 6px; background: var(--online); }

        /* Чаты */
        .chats-section {
            padding: 10px 8px 4px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 6px 8px;
        }
        .chat-item {
            display: flex; align-items: center;
            padding: 10px 10px;
            border-radius: 10px;
            cursor: pointer;
            gap: 11px;
            transition: background .15s;
            margin-bottom: 2px;
        }
        .chat-item:hover { background: rgba(255,255,255,.05); }
        .chat-item.active { background: rgba(0,136,204,.2); }

        .chat-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--bg-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .chat-avatar.private { background: rgba(0,136,204,.25); }

        .chat-meta { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-preview { font-size: 0.78rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 0.72rem; color: var(--text-dim); flex-shrink: 0; }

        .unread {
            background: var(--primary); color: #fff;
            font-size: 0.7rem; font-weight: 700;
            border-radius: 10px; padding: 1px 7px;
            min-width: 20px; text-align: center;
        }

        /* Область чата */
        .chat-area {
            flex: 1;
            display: flex; flex-direction: column;
            overflow: hidden;
            background: var(--bg-darkest);
        }

        .chat-top {
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-dark);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .chat-top-left { display: flex; align-items: center; gap: 12px; }
        .chat-top-info .chat-top-name { font-weight: 700; font-size: 1rem; }
        .chat-top-info .chat-top-sub { font-size: 0.78rem; color: var(--text-dim); }
        .chat-top-info .typing-txt { color: var(--typing-color); font-style: italic; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            display: flex; flex-direction: column;
            gap: 8px;
        }

        /* Сообщения */
        .msg {
            max-width: 68%;
            animation: msgIn .2s ease;
        }
        @keyframes msgIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }

        .msg.out { align-self: flex-end; }
        .msg.in { align-self: flex-start; }
        .msg.sys {
            align-self: center; max-width: 90%;
            background: rgba(255,255,255,.07);
            border-radius: 10px; padding: 6px 14px;
            font-size: 0.82rem; color: var(--text-dim); text-align: center;
        }

        .msg-bubble {
            padding: 10px 14px; border-radius: 16px;
            line-height: 1.45; word-break: break-word;
            position: relative;
        }
        .msg.out .msg-bubble {
            background: var(--primary);
            border-bottom-right-radius: 4px;
        }
        .msg.in .msg-bubble {
            background: var(--bg-light);
            border-bottom-left-radius: 4px;
        }

        .msg-sender { font-size: 0.76rem; font-weight: 700; color: var(--primary-light); margin-bottom: 3px; }
        .msg-text { font-size: 0.93rem; }
        .msg-footer {
            display: flex; align-items: center; justify-content: flex-end;
            gap: 5px; margin-top: 4px;
        }
        .msg-time { font-size: 0.7rem; opacity: .65; }
        .msg-tick { font-size: 0.75rem; opacity: .7; }

        /* Загрузка истории */
        .load-more {
            text-align: center; padding: 8px;
        }
        .load-more-btn {
            background: none; border: 1px solid var(--border);
            border-radius: 20px; color: var(--text-dim);
            padding: 5px 16px; cursor: pointer; font-size: 0.8rem;
            transition: all .2s;
        }
        .load-more-btn:hover { background: var(--bg-light); color: var(--text); }

        /* Инпут */
        .input-bar {
            padding: 12px 16px;
            background: var(--bg-dark);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-row {
            display: flex; align-items: flex-end; gap: 8px;
        }
        .msg-input {
            flex: 1;
            background: var(--bg-mid); border: 1px solid var(--border);
            border-radius: 22px; padding: 10px 16px;
            color: var(--text); font-size: 0.95rem;
            resize: none; font-family: inherit;
            min-height: 42px; max-height: 110px;
            outline: none; transition: border-color .2s;
        }
        .msg-input:focus { border-color: var(--primary); }

        .send-btn {
            width: 42px; height: 42px;
            background: var(--primary); border: none; border-radius: 50%;
            color: #fff; cursor: pointer; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s; flex-shrink: 0;
        }
        .send-btn:hover { background: var(--primary-light); transform: scale(1.05); }
        .send-btn:disabled { background: #444; cursor: not-allowed; transform: none; }

        /* Пустой чат */
        .empty-state {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--text-dim); gap: 12px;
        }
        .empty-state .big-icon { font-size: 3.5rem; }
        .empty-state h2 { font-size: 1.1rem; color: var(--text); }
        .empty-state p { font-size: 0.85rem; text-align: center; max-width: 240px; line-height: 1.5; }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.2); }

        /* Демо-баннер */
        #demoBanner {
            position: fixed; bottom: 14px; right: 14px;
            background: rgba(255,170,0,.15);
            border: 1px solid rgba(255,170,0,.4);
            color: var(--typing-color);
            padding: 9px 14px; border-radius: 10px;
            font-size: 0.82rem; z-index: 200;
            backdrop-filter: blur(6px);
            display: none;
        }

        /* Спиннер */
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg) } }

        /* Адаптив */
        @media (max-width: 700px) {
            .sidebar { width: 72px; }
            .sidebar-me .me-name,
            .sidebar-me .me-status,
            .online-section, .chats-section .section-title { display: none; }
            .chat-item { padding: 8px; justify-content: center; }
            .chat-meta, .chat-time, .unread { display: none; }
            .chat-item.active .chat-meta { display: block; }
            .input-bar { padding: 8px; }
        }
    </style>
</head>
<body>

<!-- ════════════ МОДАЛЬНОЕ ОКНО ════════════ -->
<div id="loginModal">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">💬</span>
      <h1>TelegramWhite</h1>
      <small>Безопасный веб-мессенджер</small>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Вход</button>
      <button class="tab-btn" data-tab="reg">Регистрация</button>
    </div>

    <div id="msgBox" class="msg-box"></div>

    <!-- ВХОД -->
    <div id="tab-login" class="tab-content active">
      <div class="form-group">
        <label>Имя пользователя</label>
        <input id="lUser" class="inp" type="text" placeholder="Введите логин" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input id="lPass" class="inp" type="password" placeholder="Введите пароль" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>Сервер</label>
        <div class="server-row">
          <select id="serverSel" class="inp">
            <option value="">Выберите сервер...</option>
            <option value="ws://localhost:8080">🏠 Локальный (localhost:8080)</option>
            <option value="custom">🔗 Другой адрес...</option>
            <option value="demo">🎮 Демо-режим</option>
          </select>
          <button class="btn-icon" id="refreshBtn" title="Проверить">🔄</button>
        </div>
        <input id="customUrl" class="inp" type="text" placeholder="ws://адрес:порт" style="display:none;margin-top:8px;">
        <div id="srvStatus" class="server-status">
          <span class="dot"></span><span>Не выбрано</span>
        </div>
      </div>
      <div class="btn-row">
        <button id="loginBtn" class="btn-primary">Войти</button>
        <button id="autoBtn" class="btn-secondary">Авто</button>
      </div>
    </div>

    <!-- РЕГИСТРАЦИЯ -->
    <div id="tab-reg" class="tab-content">
      <div class="form-group">
        <label>Имя пользователя</label>
        <input id="rUser" class="inp" type="text" placeholder="3–20 символов" autocomplete="username">
        <div id="rUserHint" class="hint"></div>
      </div>
      <div class="form-group">
        <label>Email (необязательно)</label>
        <input id="rEmail" class="inp" type="email" placeholder="email@пример.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input id="rPass" class="inp" type="password" placeholder="Минимум 6 символов" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Подтвердите пароль</label>
        <input id="rPass2" class="inp" type="password" placeholder="Повторите пароль" autocomplete="new-password">
        <div id="rPassHint" class="hint"></div>
      </div>
      <div class="btn-row">
        <button id="regBtn" class="btn-primary">Зарегистрироваться</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════ ПРИЛОЖЕНИЕ ════════════ -->
<div id="app">
  <!-- Шапка -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-bar-logo">💬 TelegramWhite</div>
      <span id="connBadge" class="conn-badge">Demo</span>
    </div>
    <div class="top-bar-right">
      <button id="logoutBtn" class="nav-btn">Выйти</button>
    </div>
  </div>

  <!-- Тело -->
  <div class="app-body">
    <!-- Боковая панель -->
    <div class="sidebar">
      <div class="sidebar-me">
        <div id="meAvatar" class="avatar">?</div>
        <div>
          <div id="meName" class="me-name">Гость</div>
          <div class="me-status" id="meStatus">● онлайн</div>
        </div>
      </div>

      <div class="online-section">
        <div class="section-title">Онлайн</div>
        <div id="onlinePills" class="online-pills">
          <span style="font-size:.8rem;color:var(--text-dim)">Никого...</span>
        </div>
      </div>

      <div class="chats-section">
        <span class="section-title">Чаты</span>
      </div>
      <div id="chatList" class="chat-list"></div>
    </div>

    <!-- Область чата -->
    <div class="chat-area" id="chatArea">
      <div class="empty-state">
        <div class="big-icon">💬</div>
        <h2>Добро пожаловать!</h2>
        <p>Выберите чат слева или нажмите на имя пользователя, чтобы написать напрямую.</p>
      </div>
    </div>
  </div>
</div>

<div id="demoBanner">⚠️ Демо-режим: сообщения хранятся только в памяти браузера</div>

<script>
// ════════════════════════════════════════════════════
// СОСТОЯНИЕ
// ════════════════════════════════════════════════════
const S = {
    ws: null,
    user: null,
    token: null,
    demo: false,
    activeChat: null,
    chats: {},          // id -> {id, name, type}
    chatMessages: {},   // chatId -> [msg, ...]
    unread: {},         // chatId -> count
    typingTimers: {},
    demoIdCounter: 1,
    pingInterval: null,
};

// Демо-данные
const DEMO_CHAT = {id: 1, name: 'Общий чат', type: 'group'};
const DEMO_MSGS = [
    {id: 1, username: 'Система', text: '👋 Добро пожаловать в демо-режим!', created_at: Date.now()/1000 - 120, demo: true},
    {id: 2, username: 'Алиса', text: 'Привет! Это пример сообщения 😊', created_at: Date.now()/1000 - 60, demo: true},
];

// ════════════════════════════════════════════════════
// UI УТИЛИТЫ
// ════════════════════════════════════════════════════
const $ = id => document.getElementById(id);

function showMsg(text, type = 'info') {
    const el = $('msgBox');
    el.textContent = text;
    el.className = `msg-box ${type}`;
}
function clearMsg() {
    $('msgBox').className = 'msg-box';
}

function setServerStatus(state, text) {
    const el = $('srvStatus');
    const dot = el.querySelector('.dot');
    const span = el.querySelector('span');
    dot.className = 'dot ' + (state === 'ok' ? 'online' : state === 'wait' ? 'connecting' : state === 'err' ? 'error' : '');
    span.textContent = text;
}

function fmtTime(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleTimeString('ru', {hour: '2-digit', minute: '2-digit'});
}

function initials(name) {
    return (name || '?').charAt(0).toUpperCase();
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

// ════════════════════════════════════════════════════
// ВКЛАДКИ
// ════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        $(`tab-${btn.dataset.tab}`).classList.add('active');
        clearMsg();
    });
});

// ════════════════════════════════════════════════════
// СЕРВЕР / ПОДКЛЮЧЕНИЕ
// ════════════════════════════════════════════════════
function getServerUrl() {
    const sel = $('serverSel').value;
    if (sel === 'custom') return $('customUrl').value.trim();
    if (sel === 'demo' || sel === '') return null;
    return sel;
}

$('serverSel').addEventListener('change', function() {
    const v = this.value;
    $('customUrl').style.display = v === 'custom' ? 'block' : 'none';
    if (v && v !== 'custom' && v !== 'demo' && v !== '') {
        checkServer(v);
    } else if (v === 'demo') {
        setServerStatus('ok', 'Демо-режим активен');
    } else {
        setServerStatus('', 'Не выбрано');
    }
});

$('customUrl').addEventListener('input', function() {
    if (this.value.trim()) checkServer(this.value.trim());
});

$('refreshBtn').addEventListener('click', () => {
    const url = getServerUrl();
    if (url) checkServer(url);
    else autoDiscover();
});

function checkServer(url) {
    setServerStatus('wait', 'Проверяем...');
    const ws = new WebSocket(url);
    const t = setTimeout(() => { ws.close(); setServerStatus('err', 'Недоступен'); }, 3000);
    ws.onopen = () => { clearTimeout(t); ws.close(); setServerStatus('ok', 'Сервер доступен ✓'); };
    ws.onerror = () => { clearTimeout(t); setServerStatus('err', 'Ошибка подключения'); };
}

async function autoDiscover() {
    setServerStatus('wait', 'Поиск серверов...');
    const urls = ['ws://localhost:8080', 'ws://127.0.0.1:8080'];
    for (const url of urls) {
        try {
            await new Promise((res, rej) => {
                const ws = new WebSocket(url);
                const t = setTimeout(() => { ws.close(); rej(); }, 2000);
                ws.onopen = () => { clearTimeout(t); ws.close(); res(); };
                ws.onerror = () => { clearTimeout(t); rej(); };
            });
            $('serverSel').value = url;
            setServerStatus('ok', `Найден: ${url}`);
            return;
        } catch {}
    }
    setServerStatus('err', 'Серверы не найдены');
}

$('autoBtn').addEventListener('click', autoDiscover);

// ════════════════════════════════════════════════════
// АВТОРИЗАЦИЯ
// ════════════════════════════════════════════════════
$('loginBtn').addEventListener('click', doLogin);
$('lPass').addEventListener('keydown', e => e.key === 'Enter' && doLogin());

function doLogin() {
    const username = $('lUser').value.trim();
    const password = $('lPass').value;
    const url = getServerUrl();

    if (!username || !password) return showMsg('Введите логин и пароль', 'error');

    const isDemoMode = $('serverSel').value === 'demo' || !url;

    if (isDemoMode) {
        enterDemoMode(username);
        return;
    }

    $('loginBtn').disabled = true;
    $('loginBtn').innerHTML = '<span class="spinner"></span> Подключение...';

    connectWS(url, () => {
        wsSend({type: 'login', username, password});
    }, () => {
        $('loginBtn').disabled = false;
        $('loginBtn').textContent = 'Войти';
        showMsg('Не удалось подключиться к серверу', 'error');
    });
}

$('regBtn').addEventListener('click', doRegister);

function doRegister() {
    const username = $('rUser').value.trim();
    const email = $('rEmail').value.trim();
    const pass = $('rPass').value;
    const pass2 = $('rPass2').value;
    const url = getServerUrl();

    if (!username || username.length < 3) return showMsg('Имя пользователя: минимум 3 символа', 'error');
    if (pass.length < 6) return showMsg('Пароль: минимум 6 символов', 'error');
    if (pass !== pass2) return showMsg('Пароли не совпадают', 'error');
    if (!url || $('serverSel').value === 'demo') return showMsg('Для регистрации выберите сервер', 'error');

    $('regBtn').disabled = true;
    $('regBtn').innerHTML = '<span class="spinner"></span>';

    connectWS(url, () => {
        wsSend({type: 'register', username, password: pass, email});
    }, () => {
        $('regBtn').disabled = false;
        $('regBtn').textContent = 'Зарегистрироваться';
        showMsg('Не удалось подключиться к серверу', 'error');
    });
}

// Валидация паролей
$('rPass2').addEventListener('input', () => {
    const hint = $('rPassHint');
    if ($('rPass').value && $('rPass2').value) {
        if ($('rPass').value === $('rPass2').value) {
            hint.textContent = '✓ Пароли совпадают';
            hint.className = 'hint ok';
        } else {
            hint.textContent = '✗ Пароли не совпадают';
            hint.className = 'hint err';
        }
    } else {
        hint.textContent = '';
    }
});

// ════════════════════════════════════════════════════
// WEBSOCKET
// ════════════════════════════════════════════════════
function connectWS(url, onReady, onFail) {
    try {
        const ws = new WebSocket(url);
        const timeout = setTimeout(() => { ws.close(); onFail && onFail(); }, 5000);

        ws.onopen = () => {
            clearTimeout(timeout);
            S.ws = ws;
            ws.onmessage = e => onMessage(JSON.parse(e.data));
            ws.onclose = onWsClose;
            ws.onerror = () => {};
            onReady && onReady();
        };
        ws.onerror = () => { clearTimeout(timeout); onFail && onFail(); };
    } catch(e) {
        onFail && onFail();
    }
}

function wsSend(data) {
    if (S.ws && S.ws.readyState === WebSocket.OPEN) {
        S.ws.send(JSON.stringify(data));
        return true;
    }
    return false;
}

function onWsClose() {
    updateConnBadge(false);
    clearInterval(S.pingInterval);
    // Попытка переподключения через 3 сек
    if (S.user) {
        setTimeout(() => {
            const url = getServerUrl();
            if (url) {
                connectWS(url, () => {
                    if (S.token) wsSend({type: 'session', token: S.token});
                }, null);
            }
        }, 3000);
    }
}

function startPing() {
    clearInterval(S.pingInterval);
    S.pingInterval = setInterval(() => {
        wsSend({type: 'ping'});
    }, 25000);
}

// ════════════════════════════════════════════════════
// ОБРАБОТЧИК СООБЩЕНИЙ ОТ СЕРВЕРА
// ════════════════════════════════════════════════════
function onMessage(data) {
    switch(data.type) {
        case 'registered':
            showMsg('✅ Регистрация прошла успешно! Войдите с вашими данными.', 'success');
            $('regBtn').disabled = false;
            $('regBtn').textContent = 'Зарегистрироваться';
            // Переключаемся на вкладку входа
            document.querySelector('[data-tab="login"]').click();
            $('lUser').value = $('rUser').value;
            break;

        case 'logged_in':
        case 'session_ok':
            $('loginBtn').disabled = false;
            $('loginBtn').textContent = 'Войти';
            S.user = data.user;
            S.token = data.token || S.token;
            if (data.token) {
                localStorage.setItem('tw_session', JSON.stringify({
                    token: data.token,
                    url: getServerUrl()
                }));
            }
            initChats(data.chats || []);
            enterApp();
            startPing();
            break;

        case 'history':
            S.chatMessages[data.chat_id] = data.messages || [];
            if (S.activeChat === data.chat_id) renderMessages();
            break;

        case 'message':
            const msg = data.message;
            if (!S.chatMessages[msg.chat_id]) S.chatMessages[msg.chat_id] = [];
            S.chatMessages[msg.chat_id].push(msg);
            if (S.activeChat === msg.chat_id) {
                appendMessage(msg);
                scrollBottom();
            } else {
                S.unread[msg.chat_id] = (S.unread[msg.chat_id] || 0) + 1;
            }
            updateChatPreview(msg.chat_id, msg.username + ': ' + msg.text, msg.created_at);
            break;

        case 'system':
            const sysmsg = {id: 'sys_' + Date.now(), username: 'Система', text: data.text, created_at: Date.now()/1000, sys: true};
            if (!S.chatMessages[data.chat_id]) S.chatMessages[data.chat_id] = [];
            S.chatMessages[data.chat_id].push(sysmsg);
            if (S.activeChat === data.chat_id) {
                appendMessage(sysmsg);
                scrollBottom();
            }
            break;

        case 'online_users':
            renderOnlineUsers(data.users || []);
            break;

        case 'typing':
            if (data.chat_id === S.activeChat) showTyping(data.username);
            break;

        case 'private_chat_created':
        case 'new_private_chat':
            const c = data.chat;
            S.chats[c.id] = c;
            if (!S.chatMessages[c.id]) S.chatMessages[c.id] = data.messages || [];
            addChatToList(c);
            if (data.type === 'private_chat_created') {
                switchChat(c.id);
            }
            break;

        case 'logged_out':
            doFullLogout();
            break;

        case 'error':
            showMsg(data.message || 'Произошла ошибка', 'error');
            $('loginBtn').disabled = false;
            $('loginBtn').textContent = 'Войти';
            $('regBtn').disabled = false;
            $('regBtn').textContent = 'Зарегистрироваться';
            break;

        case 'pong':
            updateConnBadge(true);
            break;
    }
}

// ════════════════════════════════════════════════════
// ДЕМО-РЕЖИМ
// ════════════════════════════════════════════════════
function enterDemoMode(username) {
    S.demo = true;
    S.user = {id: 0, username};
    S.token = null;
    S.chats = {1: DEMO_CHAT};
    S.chatMessages = {1: [...DEMO_MSGS]};
    $('demoBanner').style.display = 'block';
    enterApp();

    // Имитируем приветственное сообщение
    setTimeout(() => {
        const welcomeMsg = {
            id: ++S.demoIdCounter,
            username: 'Система',
            text: `👋 ${username} присоединился!`,
            created_at: Date.now() / 1000,
            sys: true
        };
        S.chatMessages[1].push(welcomeMsg);
        if (S.activeChat === 1) { appendMessage(welcomeMsg); scrollBottom(); }
    }, 600);
}

// ════════════════════════════════════════════════════
// ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ
// ════════════════════════════════════════════════════
function enterApp() {
    $('loginModal').style.display = 'none';
    $('app').style.display = 'flex';

    const u = S.user;
    $('meAvatar').textContent = initials(u.username);
    $('meName').textContent = u.username;

    updateConnBadge(!S.demo);

    renderChatList();
    // Автоматически открываем общий чат
    switchChat(1);
}

function updateConnBadge(connected) {
    const el = $('connBadge');
    if (S.demo) { el.textContent = 'Demo'; el.className = 'conn-badge'; return; }
    el.textContent = connected ? '● Live' : '⟳ Reconnect...';
    el.className = connected ? 'conn-badge live' : 'conn-badge';
}

function initChats(chats) {
    S.chats = {};
    chats.forEach(c => { S.chats[c.id] = c; });
    // Гарантируем общий чат
    if (!S.chats[1]) S.chats[1] = {id: 1, name: 'Общий чат', type: 'group'};
}

// ════════════════════════════════════════════════════
// РЕНДЕР ЧАТОВ
// ════════════════════════════════════════════════════
function renderChatList() {
    const container = $('chatList');
    container.innerHTML = '';
    Object.values(S.chats).forEach(c => addChatToList(c));
}

function addChatToList(chat) {
    const container = $('chatList');
    const existing = container.querySelector(`[data-chat-id="${chat.id}"]`);
    if (existing) return;

    const el = document.createElement('div');
    el.className = 'chat-item';
    el.dataset.chatId = chat.id;

    const icon = chat.type === 'group' ? '💬' : '👤';
    el.innerHTML = `
        <div class="chat-avatar ${chat.type === 'private' ? 'private' : ''}">${icon}</div>
        <div class="chat-meta">
            <div class="chat-name">${esc(chat.name)}</div>
            <div class="chat-preview" id="preview_${chat.id}">—</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <span class="chat-time" id="time_${chat.id}"></span>
            <span class="unread" id="unread_${chat.id}" style="display:none"></span>
        </div>
    `;
    el.addEventListener('click', () => switchChat(chat.id));
    container.appendChild(el);
}

function updateChatPreview(chatId, text, ts) {
    const prev = $(`preview_${chatId}`);
    const time = $(`time_${chatId}`);
    if (prev) prev.textContent = text.length > 40 ? text.slice(0, 40) + '…' : text;
    if (time) time.textContent = fmtTime(ts);

    // Поднимаем чат вверх
    const chatList = $('chatList');
    const el = chatList.querySelector(`[data-chat-id="${chatId}"]`);
    if (el) chatList.insertBefore(el, chatList.firstChild);
}

function renderOnlineUsers(users) {
    const container = $('onlinePills');
    container.innerHTML = '';
    if (users.length === 0) {
        container.innerHTML = '<span style="font-size:.8rem;color:var(--text-dim)">Никого...</span>';
        return;
    }
    users.forEach(u => {
        if (u.id === S.user.id) return;
        const pill = document.createElement('div');
        pill.className = 'online-pill';
        pill.innerHTML = `<span class="dot online"></span>${esc(u.username)}`;
        pill.title = `Написать ${u.username}`;
        pill.addEventListener('click', () => startPrivateChat(u.username));
        container.appendChild(pill);
    });
}

// ════════════════════════════════════════════════════
// ЧАТЫ
// ════════════════════════════════════════════════════
function switchChat(chatId) {
    S.activeChat = chatId;
    S.unread[chatId] = 0;

    // Активный чат в списке
    document.querySelectorAll('.chat-item').forEach(el => {
        el.classList.toggle('active', el.dataset.chatId == chatId);
    });
    const unreadEl = $(`unread_${chatId}`);
    if (unreadEl) unreadEl.style.display = 'none';

    const chat = S.chats[chatId];
    renderChatArea(chat);

    // Запрашиваем историю если нет
    if (!S.chatMessages[chatId] && !S.demo) {
        wsSend({type: 'switch_chat', chat_id: chatId});
    } else {
        renderMessages();
    }
}

function renderChatArea(chat) {
    const area = $('chatArea');
    area.innerHTML = `
        <div class="chat-top">
            <div class="chat-top-left">
                <div class="avatar sm">${chat.type === 'group' ? '💬' : initials(chat.name)}</div>
                <div class="chat-top-info">
                    <div class="chat-top-name">${esc(chat.name)}</div>
                    <div class="chat-top-sub" id="chatSub">${chat.type === 'group' ? 'Группа' : 'Личная переписка'}</div>
                </div>
            </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-bar">
            <div class="input-row">
                <textarea class="msg-input" id="msgInput" placeholder="Введите сообщение..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    `;

    const input = $('msgInput');
    const btn = $('sendBtn');

    input.addEventListener('input', () => {
        autoResize(input);
        if (!S.demo) wsSend({type: 'typing', chat_id: S.activeChat});
    });
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    btn.addEventListener('click', sendMessage);
    setTimeout(() => input.focus(), 50);
}

function renderMessages() {
    const container = $('messages');
    if (!container) return;
    container.innerHTML = '';

    const msgs = S.chatMessages[S.activeChat] || [];

    // Кнопка "загрузить ещё"
    if (msgs.length >= 50 && !S.demo) {
        const lb = document.createElement('div');
        lb.className = 'load-more';
        lb.innerHTML = `<button class="load-more-btn" id="loadMoreBtn">⬆ Загрузить предыдущие</button>`;
        container.appendChild(lb);
        $('loadMoreBtn').addEventListener('click', loadMore);
    }

    msgs.forEach(m => appendMessage(m, false));
    scrollBottom();
}

function appendMessage(msg, animate = true) {
    const container = $('messages');
    if (!container) return;

    const el = document.createElement('div');
    const isMe = msg.username === S.user.username;
    const isSys = msg.sys || msg.username === 'Система';

    if (isSys) {
        el.className = 'msg sys';
        el.textContent = msg.text;
    } else {
        el.className = `msg ${isMe ? 'out' : 'in'}`;
        if (!animate) el.style.animation = 'none';
        el.innerHTML = `
            <div class="msg-bubble">
                ${!isMe ? `<div class="msg-sender">${esc(msg.username)}</div>` : ''}
                <div class="msg-text">${esc(msg.text)}</div>
                <div class="msg-footer">
                    <span class="msg-time">${fmtTime(msg.created_at)}</span>
                    ${isMe ? '<span class="msg-tick">✓✓</span>' : ''}
                </div>
            </div>
        `;
    }

    container.appendChild(el);
}

function scrollBottom() {
    const c = $('messages');
    if (c) requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
}

function loadMore() {
    const msgs = S.chatMessages[S.activeChat] || [];
    if (msgs.length === 0) return;
    wsSend({type: 'get_history', chat_id: S.activeChat, before_id: msgs[0].id});
}

// ════════════════════════════════════════════════════
// ОТПРАВКА СООБЩЕНИЙ
// ════════════════════════════════════════════════════
function sendMessage() {
    const input = $('msgInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);

    if (S.demo) {
        const msg = {
            id: ++S.demoIdCounter,
            username: S.user.username,
            text,
            created_at: Date.now() / 1000,
            chat_id: S.activeChat
        };
        if (!S.chatMessages[S.activeChat]) S.chatMessages[S.activeChat] = [];
        S.chatMessages[S.activeChat].push(msg);
        appendMessage(msg);
        scrollBottom();
        updateChatPreview(S.activeChat, text, msg.created_at);

        // Имитируем ответ
        setTimeout(() => {
            const reply = {
                id: ++S.demoIdCounter,
                username: 'Бот',
                text: `Эхо: ${text}`,
                created_at: Date.now() / 1000,
                chat_id: S.activeChat
            };
            S.chatMessages[S.activeChat].push(reply);
            appendMessage(reply);
            scrollBottom();
        }, 700);
        return;
    }

    wsSend({type: 'send_message', chat_id: S.activeChat, text});
}

// ════════════════════════════════════════════════════
// ТАЙПИНГ
// ════════════════════════════════════════════════════
function showTyping(username) {
    const sub = $('chatSub');
    if (!sub) return;
    sub.innerHTML = `<span class="typing-txt">✏️ ${esc(username)} печатает...</span>`;
    clearTimeout(S.typingTimers[username]);
    S.typingTimers[username] = setTimeout(() => {
        if (sub) sub.textContent = S.chats[S.activeChat]?.type === 'group' ? 'Группа' : 'Личная переписка';
    }, 3000);
}

// ════════════════════════════════════════════════════
// ЛИЧНЫЕ ЧАТЫ
// ════════════════════════════════════════════════════
function startPrivateChat(username) {
    if (S.demo) {
        showMsg('В демо-режиме личные чаты недоступны', 'info'); return;
    }
    wsSend({type: 'start_private', username});
}

// ════════════════════════════════════════════════════
// ВЫХОД
// ════════════════════════════════════════════════════
$('logoutBtn').addEventListener('click', () => {
    if (!S.demo && S.token) {
        wsSend({type: 'logout', token: S.token});
    } else {
        doFullLogout();
    }
});

function doFullLogout() {
    clearInterval(S.pingInterval);
    if (S.ws) S.ws.close();
    S.ws = null; S.user = null; S.token = null;
    S.demo = false; S.activeChat = null;
    S.chats = {}; S.chatMessages = {}; S.unread = {};
    localStorage.removeItem('tw_session');
    $('app').style.display = 'none';
    $('demoBanner').style.display = 'none';
    $('loginModal').style.display = 'flex';
    $('lPass').value = '';
    clearMsg();
}

// ════════════════════════════════════════════════════
// АВТОСЕССИЯ
// ════════════════════════════════════════════════════
window.addEventListener('load', () => {
    const saved = localStorage.getItem('tw_session');
    if (!saved) return;
    try {
        const {token, url} = JSON.parse(saved);
        if (!token || !url) return;
        $('serverSel').value = url in {'ws://localhost:8080': 1} ? url : 'custom';
        if ($('serverSel').value === 'custom') { $('customUrl').value = url; $('customUrl').style.display = 'block'; }

        connectWS(url, () => {
            wsSend({type: 'session', token});
            S.token = token;
        }, null);
    } catch {}
});

// ════════════════════════════════════════════════════
// УТИЛИТЫ
// ════════════════════════════════════════════════════
function esc(str) {
    return String(str || '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}
